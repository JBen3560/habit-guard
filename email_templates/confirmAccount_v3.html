<style>
  @media (prefers-color-scheme: dark) {
    .email-bg {
      background-color: #111827 !important;
    }
    .email-card {
      background-color: #1f2937 !important;
      border-color: #374151 !important;
    }
    .email-h1 {
      color: #f9fafb !important;
    }
    .email-p {
      color: #9ca3af !important;
    }
    .email-strong {
      color: #f9fafb !important;
    }
    .email-footer {
      color: #6b7280 !important;
    }
    .email-callout {
      background-color: #064e3b !important;
      border-color: #065f46 !important;
      color: #6ee7b7 !important;
    }
    .email-callout-icon {
      fill: #6ee7b7 !important;
    }
    .email-icon-circle {
      background-color: #1e3a5f !important;
    }
  }
</style>

<table
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  class="email-bg"
  style="
    background-color: #f9fafb;
    padding: 40px 24px;
    font-family:
      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  "
>
  <tr>
    <td align="center">
      <!-- Card -->
      <table
        width="100%"
        cellpadding="0"
        cellspacing="0"
        border="0"
        class="email-card"
        style="
          max-width: 420px;
          background: #ffffff;
          border: 1px solid #e5e7eb;
          border-radius: 24px;
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.07);
          padding: 48px 40px;
          text-align: center;
        "
      >
        <tr>
          <td align="center" style="padding-bottom: 20px">
            <!-- Shield icon circle — blue to match original -->
            <div
              class="email-icon-circle"
              style="
                display: inline-block;
                width: 72px;
                height: 72px;
                background: #dbeafe;
                border-radius: 50%;
                text-align: center;
              "
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="36"
                height="36"
                fill="#1d4ed8"
                style="vertical-align: middle; margin-top: 18px"
              >
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
              </svg>
            </div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom: 10px">
            <h1
              class="email-h1"
              style="
                margin: 0;
                font-size: 26px;
                font-weight: 800;
                letter-spacing: -0.5px;
                color: #111827;
              "
            >
              Confirm your account
            </h1>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom: 8px">
            <p class="email-p" style="margin: 0; color: #6b7280; font-size: 15px; line-height: 1.7">
              Thanks for signing up for
              <strong class="email-strong" style="color: #111827">Habit Guard</strong>.
            </p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom: 32px">
            <p class="email-p" style="margin: 0; color: #6b7280; font-size: 15px; line-height: 1.7">
              Click the button below to verify your email address and activate your account.
            </p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom: 32px">
            <!-- Button -->
            <a
              href="{{ .ConfirmationURL }}"
              style="
                display: inline-block;
                background: #3b82f6;
                color: #ffffff;
                text-decoration: none;
                font-size: 15px;
                font-weight: 700;
                padding: 14px 32px;
                border-radius: 14px;
              "
            >
              Verify my email
            </a>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom: 24px">
            <!-- Callout -->
            <div
              class="email-callout"
              style="
                display: inline-block;
                background: #d1fae5;
                color: #065f46;
                border: 1px solid #6ee7b7;
                border-radius: 12px;
                padding: 12px 20px;
                font-size: 14px;
                font-weight: 600;
                line-height: 1.5;
              "
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="#065f46"
                class="email-callout-icon"
                style="vertical-align: middle; margin-right: 6px; margin-bottom: 2px"
              >
                <path
                  d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-2 20h-4v-1h4v1zm3.25-3H6.75V4h10.5v14z"
                />
              </svg>
              After confirming, return to Expo Go to sign in
            </div>
          </td>
        </tr>
        <tr>
          <td align="center">
            <p class="email-p" style="margin: 0; font-size: 13px; color: #9ca3af; line-height: 1.6">
              If you didn't create a Habit Guard account, you can safely ignore this email.
            </p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-top: 24px">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="#9ca3af"
              class="email-footer"
              style="vertical-align: middle; margin-right: 4px; margin-bottom: 2px"
            >
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
            </svg>
            <span class="email-footer" style="font-size: 13px; color: #9ca3af">Habit Guard</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
