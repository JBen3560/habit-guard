<style>
  @media (prefers-color-scheme: dark) {
    .email-bg {
      background-color: #111827 !important;
    }
    .email-card {
      background-color: #1f2937 !important;
      border-color: #374151 !important;
    }
    .email-logo-mark {
      background-color: #1e3a5f !important;
      border-color: #374151 !important;
    }
    .email-brand {
      color: #9ca3af !important;
    }
    .email-status {
      background-color: #064e3b !important;
    }
    .email-status-icon {
      fill: #34d399 !important;
    }
    .email-h1 {
      color: #f9fafb !important;
    }
    .email-p {
      color: #9ca3af !important;
    }
    .email-strong {
      color: #f9fafb !important;
    }
    .email-callout {
      background-color: #064e3b !important;
      color: #6ee7b7 !important;
      border-color: #065f46 !important;
    }
    .email-callout-icon {
      fill: #6ee7b7 !important;
    }
    .email-footer {
      color: #6b7280 !important;
    }
  }
</style>

<table
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  class="email-bg"
  style="
    background-color: #f9fafb;
    padding: 40px 24px;
    font-family:
      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  "
>
  <tr>
    <td align="center">
      <table
        width="100%"
        cellpadding="0"
        cellspacing="0"
        border="0"
        class="email-card"
        style="
          max-width: 420px;
          background: #ffffff;
          border: 1px solid #e5e7eb;
          border-radius: 24px;
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.07);
          padding: 48px 40px;
          text-align: center;
        "
      >
        <!-- Logo mark -->
        <tr>
          <td align="center" style="padding-bottom: 8px">
            <div
              class="email-logo-mark"
              style="
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 64px;
                height: 64px;
                background: #eff6ff;
                border: 1px solid #e5e7eb;
                border-radius: 18px;
                box-shadow: 0 4px 14px rgba(59, 130, 246, 0.1);
              "
            >
              <!-- shield -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="32"
                height="32"
                fill="#3b82f6"
              >
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
              </svg>
            </div>
          </td>
        </tr>

        <!-- Brand name -->
        <tr>
          <td align="center" style="padding-bottom: 28px">
            <span
              class="email-brand"
              style="font-size: 13px; font-weight: 700; color: #6b7280; letter-spacing: 0.2px"
              >Habit Guard</span
            >
          </td>
        </tr>

        <!-- Status icon -->
        <tr>
          <td align="center" style="padding-bottom: 20px">
            <div
              class="email-status"
              style="
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 72px;
                height: 72px;
                background: #d1fae5;
                border-radius: 50%;
              "
            >
              <!-- check_circle -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="38"
                height="38"
                fill="#10b981"
                class="email-status-icon"
              >
                <path
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                />
              </svg>
            </div>
          </td>
        </tr>

        <!-- Heading -->
        <tr>
          <td align="center" style="padding-bottom: 12px">
            <h1
              class="email-h1"
              style="
                margin: 0;
                font-size: 26px;
                font-weight: 800;
                letter-spacing: -0.5px;
                color: #111827;
              "
            >
              Confirm your account
            </h1>
          </td>
        </tr>

        <!-- Body text -->
        <tr>
          <td align="center" style="padding-bottom: 8px">
            <p class="email-p" style="margin: 0; color: #6b7280; font-size: 15px; line-height: 1.7">
              Thanks for signing up for
              <strong class="email-strong" style="color: #111827">Habit Guard</strong>.
            </p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom: 32px">
            <p class="email-p" style="margin: 0; color: #6b7280; font-size: 15px; line-height: 1.7">
              Click the button below to verify your email address and activate your account.
            </p>
          </td>
        </tr>

        <!-- Button -->
        <tr>
          <td align="center" style="padding-bottom: 32px">
            <a
              href="{{ .ConfirmationURL }}"
              style="
                display: inline-block;
                background: #3b82f6;
                color: #ffffff;
                text-decoration: none;
                font-size: 15px;
                font-weight: 700;
                padding: 14px 32px;
                border-radius: 14px;
              "
            >
              Verify my email
            </a>
          </td>
        </tr>

        <!-- Callout -->
        <tr>
          <td align="center" style="padding-bottom: 24px">
            <div
              class="email-callout"
              style="
                display: inline-block;
                background: #d1fae5;
                color: #065f46;
                border: 1px solid #6ee7b7;
                border-radius: 12px;
                padding: 12px 20px;
                font-size: 14px;
                font-weight: 600;
                line-height: 1.5;
              "
            >
              <!-- smartphone -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="#065f46"
                class="email-callout-icon"
                style="vertical-align: middle; margin-right: 8px; margin-bottom: 2px"
              >
                <path
                  d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"
                />
              </svg>
              Head back to Expo Go to continue
            </div>
          </td>
        </tr>

        <!-- Ignore notice -->
        <tr>
          <td align="center">
            <p class="email-p" style="margin: 0; font-size: 13px; color: #9ca3af; line-height: 1.6">
              If you didn't create a Habit Guard account, you can safely ignore this email.
            </p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td align="center" style="padding-top: 24px">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="#9ca3af"
              class="email-footer"
              style="vertical-align: middle; margin-right: 4px; margin-bottom: 2px"
            >
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
            </svg>
            <span class="email-footer" style="font-size: 13px; color: #9ca3af">Habit Guard</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
