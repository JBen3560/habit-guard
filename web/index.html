<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Confirmed</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f7fb;
        margin: 0;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 400px;
      }
      h1 {
        color: #3ecf8e;
      } /* Supabase Green */
      p {
        color: #4b5563;
        line-height: 1.5;
      }
      .btn {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background-color: #3ecf8e;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>✅ Account Confirmed!</h1>
      <p>Thank you for verifying your email. Your account is now active.</p>
      <p>You can now close this window and sign in to the app.</p>
      <!-- Optional: Link back to your app if it's a mobile app -->
      <a href="my-app-scheme://" class="btn">Open App</a>
    </div>
  </body>
</html>
