<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit-Guard</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --blue: #3B82F6;
        --green: #10B981;
        --bg: #F9FAFB;
        --card: #ffffff;
        --text: #111827;
        --sub: #6B7280;
        --border: #E5E7EB;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.07);
        padding: 48px 40px;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        background: #EFF6FF;
        border: 1px solid var(--border);
        border-radius: 18px;
        font-size: 32px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 10px;
        color: var(--text);
      }
      p {
        color: var(--sub);
        line-height: 1.6;
        font-size: 15px;
        margin-bottom: 8px;
      }
      .btn {
        display: inline-block;
        margin-top: 28px;
        padding: 14px 28px;
        background: var(--blue);
        color: #fff;
        text-decoration: none;
        border-radius: 14px;
        font-weight: 700;
        font-size: 15px;
        transition: opacity 0.15s;
      }
      .btn:hover { opacity: 0.88; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🛡️</div>
      <h1>Habit-Guard</h1>
      <p>Build habits that stick. Track your progress, stay consistent, and earn trophies along the way.</p>
      <p>Download the app to get started.</p>
      <a href="#" class="btn">Open App</a>
    </div>
  </body>
</html>
