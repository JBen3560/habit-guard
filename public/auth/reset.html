<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Habit-Guard</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --blue: #3B82F6;
        --green: #10B981;
        --bg: #F9FAFB;
        --card: #ffffff;
        --text: #111827;
        --sub: #6B7280;
        --border: #E5E7EB;
        --error: #DC2626;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.07);
        padding: 48px 40px;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        background: #EFF6FF;
        border: 1px solid var(--border);
        border-radius: 18px;
        font-size: 32px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }
      .subtitle {
        color: var(--sub);
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 28px;
      }
      label {
        display: block;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.6px;
        color: var(--sub);
        margin-bottom: 6px;
        margin-top: 16px;
      }
      input[type="password"] {
        width: 100%;
        padding: 13px 14px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-size: 15px;
        color: var(--text);
        background: var(--bg);
        outline: none;
        transition: border-color 0.15s;
      }
      input[type="password"]:focus { border-color: var(--blue); }
      .message {
        margin-top: 14px;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.5;
        display: none;
      }
      .message.error { background: #FEF2F2; border: 1px solid #FCA5A5; color: var(--error); display: block; }
      .message.success { background: #D1FAE5; border: 1px solid #6EE7B7; color: #065F46; display: block; }
      .btn {
        display: block;
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 14px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn:hover { opacity: 0.88; }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .brand {
        font-size: 13px;
        color: #9CA3AF;
        margin-top: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🛡️</div>
      <h1>Reset Password</h1>
      <p class="subtitle">Enter a new password for your Habit-Guard account.</p>

      <label for="password">NEW PASSWORD</label>
      <input type="password" id="password" placeholder="At least 6 characters" />

      <label for="confirm">CONFIRM PASSWORD</label>
      <input type="password" id="confirm" placeholder="Repeat your new password" />

      <div class="message" id="msg"></div>

      <button class="btn" id="submitBtn" onclick="handleReset()">Update Password</button>

      <div class="brand">🛡️ Habit-Guard</div>
    </div>

    <script>
      // Extract access_token from the URL fragment (Supabase puts it there)
      const params = new URLSearchParams(window.location.hash.replace('#', '?'));
      const accessToken = params.get('access_token');

      async function handleReset() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const msg = document.getElementById('msg');
        const btn = document.getElementById('submitBtn');

        msg.className = 'message';
        msg.textContent = '';

        if (password.length < 6) {
          msg.className = 'message error';
          msg.textContent = 'Password must be at least 6 characters.';
          return;
        }
        if (password !== confirm) {
          msg.className = 'message error';
          msg.textContent = 'Passwords do not match.';
          return;
        }
        if (!accessToken) {
          msg.className = 'message error';
          msg.textContent = 'Invalid or expired reset link. Please request a new one.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Updating…';

        try {
          const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
          const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';

          const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${accessToken}`,
            },
            body: JSON.stringify({ password }),
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || 'Something went wrong.');
          }

          msg.className = 'message success';
          msg.textContent = 'Password updated! You can now sign in to the app.';
          btn.textContent = 'Done';
        } catch (err) {
          msg.className = 'message error';
          msg.textContent = err.message || 'Failed to update password. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Update Password';
        }
      }
    </script>
  </body>
</html>
