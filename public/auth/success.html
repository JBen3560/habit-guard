<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verified — Habit-Guard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --blue: #3b82f6;
        --green: #10b981;
        --bg: #f9fafb;
        --card: #ffffff;
        --text: #111827;
        --sub: #6b7280;
        --border: #e5e7eb;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.07);
        padding: 48px 40px;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }
      .logo-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        background: #eff6ff;
        border: 1px solid var(--border);
        border-radius: 18px;
        margin-bottom: 8px;
        box-shadow: 0 4px 14px rgba(59, 130, 246, 0.1);
      }
      .logo-mark .material-icons-round {
        font-size: 32px;
        color: var(--blue);
      }
      .brand-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--sub);
        margin-bottom: 28px;
        letter-spacing: 0.2px;
      }
      .status-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        background: #d1fae5;
        border-radius: 50%;
        margin-bottom: 20px;
      }
      .status-icon .material-icons-round {
        font-size: 38px;
        color: var(--green);
      }
      h1 {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text);
        margin-bottom: 12px;
      }
      p {
        color: var(--sub);
        line-height: 1.7;
        font-size: 15px;
        margin-bottom: 8px;
      }
      .callout {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 20px;
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #6ee7b7;
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.5;
      }
      .callout .material-icons-round {
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo-mark">
        <span class="material-icons-round">shield</span>
      </div>
      <div class="brand-name">Habit-Guard</div>

      <div class="status-icon">
        <span class="material-icons-round">check_circle</span>
      </div>
      <h1>Email Verified!</h1>
      <p>Your Habit-Guard account is now active.</p>
      <p>
        Close this browser tab and return to <strong>Expo Go</strong> to sign in and start building
        your habits.
      </p>
      <div class="callout">
        <span class="material-icons-round">smartphone</span>
        Head back to Expo Go to continue
      </div>
    </div>
  </body>
</html>
