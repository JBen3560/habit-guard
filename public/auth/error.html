<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Something Went Wrong — Habit-Guard</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --blue: #3B82F6;
        --bg: #F9FAFB;
        --card: #ffffff;
        --text: #111827;
        --sub: #6B7280;
        --border: #E5E7EB;
        --error: #DC2626;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.07);
        padding: 48px 40px;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }
      .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        background: #FEF2F2;
        border-radius: 50%;
        font-size: 32px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 10px;
        color: var(--text);
      }
      p {
        color: var(--sub);
        line-height: 1.6;
        font-size: 15px;
        margin-bottom: 8px;
      }
      .error-detail {
        margin-top: 16px;
        padding: 10px 14px;
        background: #FEF2F2;
        border: 1px solid #FCA5A5;
        border-radius: 10px;
        font-size: 13px;
        color: var(--error);
        line-height: 1.5;
        display: none;
      }
      .btn {
        display: inline-block;
        margin-top: 28px;
        padding: 14px 28px;
        background: var(--blue);
        color: #fff;
        text-decoration: none;
        border-radius: 14px;
        font-weight: 700;
        font-size: 15px;
        transition: opacity 0.15s;
      }
      .btn:hover { opacity: 0.88; }
      .brand {
        font-size: 13px;
        color: #9CA3AF;
        margin-top: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">⚠️</div>
      <h1>Something Went Wrong</h1>
      <p>This link may have expired or already been used.</p>
      <p>Please return to the app and try again.</p>
      <div class="error-detail" id="errorDetail"></div>
      <a href="#" class="btn">Open Habit-Guard</a>
      <div class="brand">🛡️ Habit-Guard</div>
    </div>

    <script>
      const params = new URLSearchParams(globalThis.location.search);
      const desc = params.get('error_description') || params.get('error');
      if (desc) {
        const el = document.getElementById('errorDetail');
        el.textContent = decodeURIComponent(desc.replaceAll('+', ' '));
        el.style.display = 'block';
      }
    </script>
  </body>
</html>
