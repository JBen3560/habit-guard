<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Something Went Wrong — Habit-Guard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --blue: #3b82f6;
        --bg: #f9fafb;
        --card: #ffffff;
        --text: #111827;
        --sub: #6b7280;
        --border: #e5e7eb;
        --error: #dc2626;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.07);
        padding: 48px 40px;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }
      .logo-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        background: #eff6ff;
        border: 1px solid var(--border);
        border-radius: 18px;
        margin-bottom: 8px;
        box-shadow: 0 4px 14px rgba(59, 130, 246, 0.1);
      }
      .logo-mark .material-icons-round {
        font-size: 32px;
        color: var(--blue);
      }
      .brand-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--sub);
        margin-bottom: 28px;
        letter-spacing: 0.2px;
      }
      .status-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        background: #fef2f2;
        border-radius: 50%;
        margin-bottom: 20px;
      }
      .status-icon .material-icons-round {
        font-size: 38px;
        color: var(--error);
      }
      h1 {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 10px;
        color: var(--text);
      }
      p {
        color: var(--sub);
        line-height: 1.6;
        font-size: 15px;
        margin-bottom: 8px;
      }
      .error-detail {
        margin-top: 16px;
        padding: 10px 14px;
        background: #fef2f2;
        border: 1px solid #fca5a5;
        border-radius: 10px;
        font-size: 13px;
        color: var(--error);
        line-height: 1.5;
        text-align: left;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo-mark">
        <span class="material-icons-round">shield</span>
      </div>
      <div class="brand-name">Habit-Guard</div>

      <div class="status-icon">
        <span class="material-icons-round">error_outline</span>
      </div>
      <h1>Something Went Wrong</h1>
      <p>This link may have expired or already been used.</p>
      <p>Please return to the app and try again.</p>
      <div class="error-detail" id="errorDetail"></div>
    </div>

    <script>
      const params = new URLSearchParams(globalThis.location.search);
      const desc = params.get('error_description') || params.get('error');
      if (desc) {
        const el = document.getElementById('errorDetail');
        el.textContent = decodeURIComponent(desc.replaceAll('+', ' '));
        el.style.display = 'block';
      }
    </script>
  </body>
</html>
