<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video — Habit Guard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --blue: #3b82f6;
        --green: #10b981;
        --bg: #f9fafb;
        --card: #ffffff;
        --text: #111827;
        --sub: #6b7280;
        --border: #e5e7eb;
        --logo-bg: #eff6ff;
        --nav-bg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --card: #1f2937;
          --text: #f9fafb;
          --sub: #9ca3af;
          --border: #374151;
          --logo-bg: #1e3a5f;
          --nav-bg: #1f2937;
        }
      }

      /* ── Nav bar ── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: var(--nav-bg);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 1px 12px rgba(0, 0, 0, 0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 56px;
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--text);
        font-weight: 800;
        font-size: 15px;
        letter-spacing: -0.3px;
      }
      .nav-brand .material-icons-round {
        font-size: 22px;
        color: var(--blue);
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .nav-link {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        color: var(--sub);
        text-decoration: none;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .nav-link:hover {
        background: var(--bg);
        color: var(--text);
      }
      .nav-link .material-icons-round {
        font-size: 16px;
      }
      .nav-link.active {
        color: var(--blue);
        background: var(--logo-bg);
      }
      .nav-link.btn {
        background: var(--blue);
        color: #fff;
        margin-left: 4px;
      }
      .nav-link.btn:hover {
        opacity: 0.88;
        color: #fff;
        background: var(--blue);
      }

      /* ── Page body ── */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 80px 24px 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.07);
        padding: 48px 40px;
        text-align: center;
        max-width: 720px;
        width: 100%;
      }
      .logo-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        background: var(--logo-bg);
        border: 1px solid var(--border);
        border-radius: 18px;
        margin-bottom: 8px;
        box-shadow: 0 4px 14px rgba(59, 130, 246, 0.1);
      }
      .logo-mark .material-icons-round {
        font-size: 32px;
        color: var(--blue);
      }
      .brand-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--sub);
        margin-bottom: 24px;
        letter-spacing: 0.2px;
      }
      h1 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text);
        margin-bottom: 8px;
      }
      .subtitle {
        color: var(--sub);
        font-size: 15px;
        line-height: 1.7;
        margin-bottom: 32px;
      }
      .video-wrapper {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; /* 16:9 */
        border-radius: 16px;
        overflow: hidden;
        background: #000;
        margin-bottom: 32px;
        border: 1px solid var(--border);
      }
      .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }
      .footer {
        font-size: 13px;
        color: var(--sub);
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .footer .material-icons-round {
        font-size: 15px;
        color: var(--blue);
      }
    </style>
  </head>
  <body>
    <!-- Nav bar -->
    <nav>
      <a href="/about" class="nav-brand">
        <span class="material-icons-round">shield</span>
        Habit Guard
      </a>
      <div class="nav-links">
        <a href="/about" class="nav-link">
          <span class="material-icons-round">info</span>
          About
        </a>
        <a href="/video" class="nav-link active">
          <span class="material-icons-round">play_circle</span>
          Video
        </a>
        <a href="https://habit-guard.netlify.app" class="nav-link">
          <span class="material-icons-round">login</span>
          Sign In
        </a>
        <a href="https://habit-guard.netlify.app#signup" class="nav-link btn">
          <span class="material-icons-round">person_add</span>
          Create Account
        </a>
      </div>
    </nav>

    <!-- Card -->
    <div class="card">
      <div class="logo-mark">
        <span class="material-icons-round">shield</span>
      </div>
      <div class="brand-name">Habit Guard</div>

      <h1>Final Presentation</h1>
      <p class="subtitle">
        A walkthrough of Habit Guard — built by Runtime Terrors, Clemson University, Spring 2026.
      </p>

      <!-- EDIT: replace place holder video id with the actual YouTube video ID once it's created -->
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/wd3EliGt9ao"
          title="Habit Guard Final Presentation"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        >
        </iframe>
      </div>

      <div class="footer">
        <span class="material-icons-round">shield</span>
        Habit Guard · Runtime Terrors · Clemson University, Spring 2026
      </div>
    </div>
  </body>
</html>
